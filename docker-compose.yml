services:
  tiltakspenger-pdfgenrs:
    build:
      context: .
      dockerfile: Dockerfile
    image: tiltakspenger-pdfgenrs:latest
    ports:
      # Samme port som i metarepoets docker-compose; 8085 er reservert for nais login.
      - "8084:8080"
    volumes:
      - ./templates:/app/templates
      - ./fonts:/app/fonts
      - ./data:/app/data
      - ./resources:/app/resources
      - ./lib:/app/lib
    environment:
      DISABLE_PDF_GET: "false"
      DEV_MODE: "true"
      ENABLE_HTML_ENDPOINT: "true"
      JDK_JAVA_OPTIONS: ${JDK_JAVA_OPTIONS}