services:
  tiltakspenger-pdfgenrs:
    build:
      context: .
      dockerfile: Dockerfile
    # Upstream-imaget publiseres kun for linux/amd64; eksplisitt platform gjør at
    # bygg og kjøring fungerer likt på arm64-maskiner (Apple Silicon) uten advarsler.
    platform: linux/amd64
    image: tiltakspenger-pdfgenrs:latest
    ports:
      # Samme port som i metarepoets docker-compose; 8085 er reservert for nais login.
      - "127.0.0.1:8084:8080"
    volumes:
      - ./templates:/app/templates
      - ./fonts:/app/fonts
      - ./data:/app/data
      - ./resources:/app/resources
      - ./lib:/app/lib
    environment:
      DEV_MODE: "true"
