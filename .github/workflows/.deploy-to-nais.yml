name: Deploy to NAIS

on:
  workflow_call:
    inputs:
      NAIS_ENV:
        required: true
        type: string
      IMAGE:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to NAIS (${{ inputs.NAIS_ENV }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.NAIS_ENV }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Deploy to NAIS
        # Versjonsoversikt (tag -> SHA): https://github.com/nais/deploy/tags
        # Denne SHA-en: https://github.com/nais/deploy/commit/2d18f050f07b6a007864c6a57070ed915d571beb
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        env:
          CLUSTER: ${{ inputs.NAIS_ENV }}-gcp
          RESOURCE: .nais/nais.yml
          VAR: image=${{ inputs.IMAGE }}
          VARS: .nais/vars/${{ inputs.NAIS_ENV }}.yml
