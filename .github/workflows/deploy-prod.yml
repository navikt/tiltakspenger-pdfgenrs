name: Build and deploy

# Raske påfølgende pushes ga overlappende NAIS-rollouts i dev, der den første deployen
# timet ut på readiness-proben mens den neste tok over (falsk rød kjøring 2026-07-10).
# Kjør deployene serielt; ved flere ventende kjøringer vinner den nyeste.
concurrency:
  group: build-and-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.gitignore'
      - '.idea/**'
      - 'CODEOWNERS'
      - 'docker-compose.yml'
      - 'LICENSE'
      - 'run_development.sh'

jobs:
  test:
    name: Test brevmaler
    uses: ./.github/workflows/.test.yml
    permissions:
      contents: read

  build:
    name: Test and build
    uses: ./.github/workflows/.build-image.yml
    permissions:
      contents: read
      id-token: write

  deploy-dev:
    name: Deploy to NAIS (dev)
    needs: [build, test]
    uses: ./.github/workflows/.deploy-to-nais.yml
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: dev
      IMAGE: ${{ needs.build.outputs.IMAGE }}

  deploy-prod:
    name: Deploy to NAIS (prod)
    needs: [build, test]
    uses: ./.github/workflows/.deploy-to-nais.yml
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: prod
      IMAGE: ${{ needs.build.outputs.IMAGE }}
