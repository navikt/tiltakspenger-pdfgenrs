apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: tiltakspenger-pdfgenrs
  namespace: tpts
  labels:
    team: tpts
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  image: {{ image }}
  port: 8080
  ingresses:
    - {{ ingress }}
  accessPolicy:
    inbound:
      rules:
        - application: tiltakspenger-meldekort-api
        - application: tiltakspenger-soknad-api
        - application: tiltakspenger-saksbehandling-api
  azure:
    application:
      enabled: false
  # Prober følger felles mal, se «Delte konvensjoner» i navikt/tiltakspenger AGENTS.md. Avvik skal begrunnes med kommentar her.
  startup:
    path: internal/is_alive
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 60
    timeout: 3
  liveness:
    path: internal/is_alive
    periodSeconds: 10
    failureThreshold: 3
    timeout: 3
  readiness:
    path: internal/is_ready
    periodSeconds: 5
    failureThreshold: 1
    timeout: 3
  prometheus:
    enabled: true
    path: /metrics
  replicas:
    min: {{ replicas }}
    max: {{ replicas }}
  resources:
    limits:
      cpu: "1"
      memory: 2048Mi
    requests:
      cpu: 300m
      memory: 1024Mi
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: loki